# pnpm v11 stores build-script approvals here (NOT package.json#pnpm anymore).
# esbuild ships a native binary via its install script, so it must be allowed to build.
allowBuilds:
  esbuild: true
  onnxruntime-node: set this to true or false
  protobufjs: set this to true or false
  sharp: set this to true or false
